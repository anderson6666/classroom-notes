name: Split Models into Chunks (Remove RNNLM)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/split-models.yml'

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets and remove RNNLM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p workdir
          gh release download models-large \
            --repo "$GITHUB_REPOSITORY" \
            --dir workdir \
            --pattern '*.tar.gz'
          ls -lh workdir

          # Remove RNNLM directory from each model tarball
          # This allows vosk-browser WASM to load big models without RNNLM support.
          for f in workdir/*.tar.gz; do
            if [ -f "$f" ]; then
              echo "=== Removing RNNLM from $f ==="
              tmpdir=$(mktemp -d)
              tar -xzf "$f" -C "$tmpdir"
              # Find the model directory (contains am/ or final.mdl)
              model_dir=$(find "$tmpdir" -maxdepth 1 -type d ! -path "$tmpdir" | head -1)
              if [ -d "$model_dir/rnnlm" ]; then
                rm -rf "$model_dir/rnnlm"
                echo "Removed $model_dir/rnnlm"
              fi
              # Repack without rnnlm
              new_name=$(basename "$f" .tar.gz)-no-rnnlm.tar.gz
              (cd "$tmpdir" && tar -czf "$new_name" "$(basename "$model_dir")")
              mv "$tmpdir/$new_name" workdir/
              rm -rf "$tmpdir"
              rm "$f"
              mv "workdir/$new_name" "$f"
              ls -lh "$f"
            fi
          done

          echo ""
          echo "=== Final tarballs ==="
          ls -lh workdir/

      - name: Split into chunks and build manifest
        run: |
          set -euo pipefail
          CHUNK_SIZE=90000000  # ~90MB
          mkdir -p chunks/zh-CN chunks/en-US

          for f in workdir/*.tar.gz; do
            if [ -f "$f" ]; then
              base=$(basename "$f")
              if [[ "$base" == *cn* ]]; then
                lang="zh-CN"
              else
                lang="en-US"
              fi
              echo "=== Splitting $f into $lang ==="
              split -b "$CHUNK_SIZE" -d "$f" "chunks/$lang/chunk_"
            fi
          done

          # Build manifest.json with Python
          python3 <<'PYEOF'
          import json, os

          manifest = {}
          for lang in ("zh-CN", "en-US"):
              d = f"chunks/{lang}"
              if not os.path.isdir(d):
                  continue
              files = sorted(f for f in os.listdir(d) if f.startswith("chunk_"))
              if not files:
                  continue
              total = sum(os.path.getsize(os.path.join(d, f)) for f in files)
              manifest[lang] = {
                  "totalSize": total,
                  "chunks": [f"{lang}/{f}" for f in files],
              }
              print(f"{lang}: {len(files)} chunks, {total} bytes (~{total//1024//1024}MB)")

          with open("chunks/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("\n=== Manifest ===")
          print(json.dumps(manifest, indent=2))
          PYEOF

          echo ""
          echo "=== Chunk count ==="
          find chunks -name 'chunk_*' | wc -l
          echo "=== Total size ==="
          du -sh chunks

      - name: Push to model-assets branch (batched)
        run: |
          set -uo pipefail
          cd chunks
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 999999
          git checkout --orphan model-assets
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"

          push_retry() {
            local ref="$1"
            for attempt in 1 2 3; do
              echo "Push attempt $attempt for $ref..."
              if git push -f origin "$ref"; then
                echo "Push succeeded for $ref"
                return 0
              fi
              echo "Push failed (attempt $attempt), retrying in 10s..."
              sleep 10
            done
            echo "ERROR: All push attempts failed for $ref"
            return 1
          }

          # Batch 1: manifest
          git add manifest.json
          git commit -q -m "chore: add manifest.json (big models, RNNLM removed)"
          push_retry model-assets || exit 1

          # Batch 2: zh-CN chunks
          if [ -d zh-CN ]; then
            git add zh-CN/
            git commit -q -m "chore: add zh-CN model chunks (~1.3GB, RNNLM removed)"
            push_retry model-assets || exit 1
          fi

          # Batch 3: en-US chunks
          if [ -d en-US ]; then
            git add en-US/
            git commit -q -m "chore: add en-US model chunks (~1.8GB, RNNLM removed)"
            push_retry model-assets || exit 1
          fi

          echo "=== Pushed model-assets branch ==="
          git log --oneline