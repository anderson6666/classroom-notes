name: Split Models into Chunks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/split-models.yml'

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p workdir
          gh release download models-large \
            --repo "$GITHUB_REPOSITORY" \
            --dir workdir \
            --pattern '*.tar.gz'
          ls -lh workdir

      - name: Split into chunks and build manifest
        run: |
          set -euo pipefail
          CHUNK_SIZE=90000000  # ~90MB, safely under GitHub's 100MB file limit
          mkdir -p chunks/zh-CN chunks/en-US

          # Split each tar.gz into raw chunks. `split -d` produces chunk_00,
          # chunk_01, ... which sorts naturally and avoids octal-number issues.
          if [ -f workdir/vosk-model-cn-0.22.tar.gz ]; then
            echo "Splitting Chinese model..."
            split -b "$CHUNK_SIZE" -d workdir/vosk-model-cn-0.22.tar.gz chunks/zh-CN/chunk_
          fi

          if [ -f workdir/vosk-model-en-us-0.22.tar.gz ]; then
            echo "Splitting English model..."
            split -b "$CHUNK_SIZE" -d workdir/vosk-model-en-us-0.22.tar.gz chunks/en-US/chunk_
          fi

          # Build manifest.json with Python for reliable JSON generation.
          python3 <<'PYEOF'
          import json, os

          manifest = {}
          for lang in ("zh-CN", "en-US"):
              d = f"chunks/{lang}"
              if not os.path.isdir(d):
                  continue
              files = sorted(f for f in os.listdir(d) if f.startswith("chunk_"))
              if not files:
                  continue
              total = sum(os.path.getsize(os.path.join(d, f)) for f in files)
              manifest[lang] = {
                  "totalSize": total,
                  "chunks": [f"{lang}/{f}" for f in files],
              }
              print(f"{lang}: {len(files)} chunks, {total} bytes")

          with open("chunks/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("\n=== Manifest ===")
          print(json.dumps(manifest, indent=2))
          PYEOF

          echo ""
          echo "=== Chunk count ==="
          find chunks -name 'chunk_*' | wc -l
          echo "=== Total chunk size ==="
          du -sh chunks

      - name: Push to model-assets branch (batched)
        run: |
          set -uo pipefail
          cd chunks
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Increase HTTP buffer and disable low-speed timeout for large pushes.
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 999999
          git checkout --orphan model-assets
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"

          # Retry helper: push up to 3 times with 10s backoff.
          push_retry() {
            local ref="$1"
            for attempt in 1 2 3; do
              echo "Push attempt $attempt for $ref..."
              if git push -f origin "$ref"; then
                echo "Push succeeded for $ref"
                return 0
              fi
              echo "Push failed (attempt $attempt), retrying in 10s..."
              sleep 10
            done
            echo "ERROR: All push attempts failed for $ref"
            return 1
          }

          # Batch 1: manifest only (tiny, establishes the branch).
          git add manifest.json
          git commit -q -m "chore: add manifest.json"
          push_retry model-assets || exit 1

          # Batch 2: zh-CN chunks (~1.3GB).
          if [ -d zh-CN ]; then
            git add zh-CN/
            git commit -q -m "chore: add zh-CN model chunks"
            push_retry model-assets || exit 1
          fi

          # Batch 3: en-US chunks (~1.8GB).
          if [ -d en-US ]; then
            git add en-US/
            git commit -q -m "chore: add en-US model chunks"
            push_retry model-assets || exit 1
          fi

          echo "=== Pushed model-assets branch ==="
          git log --oneline
