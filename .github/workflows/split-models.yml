name: Split Models into Chunks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/split-models.yml'

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p workdir
          gh release download models-large \
            --repo "$GITHUB_REPOSITORY" \
            --dir workdir \
            --pattern '*.tar.gz'
          ls -lh workdir

      - name: Split into chunks and build manifest
        run: |
          set -euo pipefail
          CHUNK_SIZE=90000000  # ~90MB, safely under GitHub's 100MB file limit
          mkdir -p chunks/zh-CN chunks/en-US

          # Split each tar.gz into raw chunks. `split -d` produces chunk_00,
          # chunk_01, ... which sorts naturally and avoids octal-number issues
          # that arise when zero-padding numeric suffixes with printf.
          if [ -f workdir/vosk-model-cn-0.22.tar.gz ]; then
            echo "Splitting Chinese model..."
            split -b "$CHUNK_SIZE" -d workdir/vosk-model-cn-0.22.tar.gz chunks/zh-CN/chunk_
          fi

          if [ -f workdir/vosk-model-en-us-0.22.tar.gz ]; then
            echo "Splitting English model..."
            split -b "$CHUNK_SIZE" -d workdir/vosk-model-en-us-0.22.tar.gz chunks/en-US/chunk_
          fi

          # Build manifest.json with Python for reliable JSON generation.
          python3 <<'PYEOF'
          import json, os

          manifest = {}
          for lang in ("zh-CN", "en-US"):
              d = f"chunks/{lang}"
              if not os.path.isdir(d):
                  continue
              files = sorted(f for f in os.listdir(d) if f.startswith("chunk_"))
              if not files:
                  continue
              total = sum(os.path.getsize(os.path.join(d, f)) for f in files)
              manifest[lang] = {
                  "totalSize": total,
                  "chunks": [f"{lang}/{f}" for f in files],
              }
              print(f"{lang}: {len(files)} chunks, {total} bytes")

          with open("chunks/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print("\n=== Manifest ===")
          print(json.dumps(manifest, indent=2))
          PYEOF

          echo ""
          echo "=== Chunk count ==="
          find chunks -name 'chunk_*' | wc -l
          echo "=== Total chunk size ==="
          du -sh chunks

      - name: Push to model-assets branch
        run: |
          set -euo pipefail
          cd chunks
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan model-assets
          git add -A
          CHUNK_COUNT=$(find . -name 'chunk_*' | wc -l)
          TOTAL_SIZE=$(du -sh . | cut -f1)
          git commit -m "chore: split models into chunks for CORS-friendly serving

          Source: release 'models-large'
          Chunks: ${CHUNK_COUNT} files
          Total size: ${TOTAL_SIZE}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin model-assets
          echo "=== Pushed model-assets branch ==="
